name: Manual Google Indexing API

on:
  workflow_dispatch: # सिर्फ मैन्युअल क्लिक करने पर ही चलेगा

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install googleapis
        run: npm install googleapis

      - name: Create credentials file
        run: |
          echo '${{ secrets.GOOGLE_INDEXING_CREDENTIALS }}' > credentials.json

      - name: Run Indexing Script
        run: |
          cat << 'EOF' > index.js
          const fs = require('fs');
          const { google } = require('googleapis');
          const key = require('./credentials.json');

          async function runIndexing() {
            const baseUrl = "https://4kwax.github.io";
            const postsDir = './_posts';
            let urlsToIndex = [baseUrl + '/']; // होमपेज हमेशा इंडेक्स होगा

            // आज की तारीख निकालें (YYYY-MM-DD फॉर्मेट में)
            const today = new Date().toISOString().split('T')[0];
            console.log(`Today's Date: ${today}`);

            if (fs.existsSync(postsDir)) {
              fs.readdirSync(postsDir).forEach(file => {
                if (file.endsWith('.md') || file.endsWith('.markdown')) {
                  const fileDate = file.substring(0, 10);
                  
                  // अगर फाइल की तारीख आज या उससे पहले की है, तभी उसे इंडेक्स लिस्ट में डालें
                  if (fileDate <= today) {
                    const slug = file.replace(fileDate + '-', '').replace('.md', '').replace('.markdown', '');
                    urlsToIndex.push(`${baseUrl}/${slug}/`);
                  } else {
                    console.log(`[SKIPPED] Future post bypassed: ${file}`);
                  }
                }
              });
            }

            if (urlsToIndex.length === 1) {
              console.log('No new posts found for today or earlier. Only indexing homepage.');
            }

            console.log(`Total URLs to index: ${urlsToIndex.length}`);

            const jwtClient = new google.auth.JWT(
              key.client_email, null, key.private_key,
              ['https://www.googleapis.com/auth/indexing'], null
            );

            jwtClient.authorize(async (err, tokens) => {
              if (err) { console.log('[ERROR] Auth failed:', err); return; }
              const indexing = google.indexing({ version: 'v3', auth: jwtClient });

              for (const url of urlsToIndex) {
                try {
                  await indexing.urlNotifications.publish({
                    requestBody: { url: url, type: 'URL_UPDATED' }
                  });
                  console.log(`[SUCCESS] Indexed -> ${url}`);
                } catch (e) {
                  console.log(`[ERROR] Failed -> ${url} | Message: ${e.message}`);
                }
                // गूगल API को ब्लॉक करने से रोकने के लिए 2 सेकंड का गैप
                await new Promise(r => setTimeout(r, 2000));
              }
              console.log('--- Indexing Process Completed ---');
            });
          }
          runIndexing();
          EOF
          node index.js

      - name: Push to IndexNow
        run: |
          curl -k "https://www.bing.com/indexnow?url=https://4kwax.github.io/&key=7aa154a839ea4d27b7daeb0ac43e1592&keyLocation=https://4kwax.github.io/7aa154a839ea4d27b7daeb0ac43e1592.txt"
